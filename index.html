<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마케팅 전략 관리</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      display: flex;
      flex-direction: column;
      color: #1e293b;
      background: #f8fafc;
    }

    /* ══════════════════════════════
       TOP BAR
    ══════════════════════════════ */
    .top-bar {
      display: flex;
      flex-shrink: 0;
      height: 52px;
      background: #1e293b;
      border-bottom: 1px solid #0f172a;
      z-index: 50;
    }

    .corner {
      width: 260px;
      min-width: 260px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      border-right: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
      letter-spacing: 0.01em;
    }

    .tabs-scroll {
      display: flex;
      align-items: stretch;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs-scroll::-webkit-scrollbar { display: none; }

    .product-tab {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 24px;
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      border-right: 1px solid rgba(255,255,255,0.08);
      transition: all 0.15s;
      flex-shrink: 0;
      position: relative;
    }
    .product-tab::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: #4f6ef7;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .product-tab:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .product-tab.active { color: #fff; background: rgba(255,255,255,0.07); }
    .product-tab.active::after { opacity: 1; }

    .tab-name-inp {
      background: transparent;
      border: none;
      outline: none;
      color: inherit;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab-name-inp:focus {
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 2px 6px;
      cursor: text;
    }

    .tab-del {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
      flex-shrink: 0;
      line-height: 1;
      padding: 0;
    }
    .tab-del:hover { background: rgba(239,68,68,0.6); color: #fff; }

    .tab-add {
      width: 52px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.35);
      font-size: 22px;
      cursor: pointer;
      border: none;
      background: transparent;
      transition: color 0.15s;
      border-left: 1px solid rgba(255,255,255,0.08);
    }
    .tab-add:hover { color: #fff; }

    /* ══════════════════════════════
       BODY LAYOUT
    ══════════════════════════════ */
    .body-wrap {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ══════════════════════════════
       SIDEBAR
    ══════════════════════════════ */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }

    .strategy-block { border-bottom: 1px solid #f1f5f9; }

    .strategy-row {
      display: flex;
      align-items: center;
      padding: 11px 16px;
      gap: 6px;
      cursor: pointer;
      transition: background 0.1s;
      min-height: 44px;
    }
    .strategy-row:hover { background: #f8fafc; }
    .strategy-row.active { background: #eef0ff; }

    .strategy-toggle {
      font-size: 9px;
      color: #94a3b8;
      width: 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
      user-select: none;
    }
    .strategy-toggle.has-subs { color: #64748b; }

    .strategy-name-inp {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: #1e293b;
      background: transparent;
      border: none;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      min-width: 0;
    }
    .strategy-name-inp:focus {
      background: #f1f5f9;
      border-radius: 4px;
      padding: 2px 6px;
      cursor: text;
    }
    .strategy-row.active .strategy-name-inp { color: #4f6ef7; font-weight: 600; }

    .row-del {
      width: 22px; height: 22px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      transition: all 0.15s;
      padding: 0;
    }
    .row-del:hover { background: #fef2f2; color: #ef4444; }

    /* Sub rows */
    .sub-row {
      display: flex;
      align-items: center;
      padding: 8px 16px 8px 34px;
      gap: 8px;
      cursor: pointer;
      transition: background 0.1s;
      min-height: 36px;
    }
    .sub-row:hover { background: #f8fafc; }
    .sub-row.active { background: #eef0ff; }

    .sub-bullet {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #94a3b8;
      flex-shrink: 0;
    }
    .sub-row.active .sub-bullet { background: #4f6ef7; }

    .sub-name-inp {
      flex: 1;
      font-size: 13px;
      color: #475569;
      background: transparent;
      border: none;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      min-width: 0;
    }
    .sub-name-inp:focus {
      background: #f1f5f9;
      border-radius: 4px;
      padding: 2px 6px;
      cursor: text;
    }
    .sub-row.active .sub-name-inp { color: #4f6ef7; font-weight: 500; }

    /* Add sub button */
    .add-sub-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 16px 8px 34px;
      color: #4f6ef7;
      font-size: 12px;
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: inherit;
      width: 100%;
      text-align: left;
    }
    .add-sub-btn:hover { opacity: 0.75; }

    /* Sidebar footer */
    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid #f1f5f9;
      margin-top: auto;
      flex-shrink: 0;
    }
    .add-strategy-btn {
      width: 100%;
      padding: 10px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .add-strategy-btn:hover { background: #3b55e6; }

    /* ══════════════════════════════
       CONTENT AREA
    ══════════════════════════════ */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
      min-height: 44px;
    }
    .breadcrumb {
      font-size: 13px;
      color: #64748b;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bc-product { font-weight: 700; color: #4f6ef7; }
    .bc-sep { color: #cbd5e1; }
    .bc-strategy { font-weight: 600; color: #1e293b; }

    .toolbar-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 7px;
      border: 1px solid #e2e8f0;
      background: #fff;
      color: #64748b;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .toolbar-btn:hover { border-color: #4f6ef7; color: #4f6ef7; }
    .toolbar-btn-primary {
      border-color: #4f6ef7;
      background: #4f6ef7;
      color: #fff;
    }
    .toolbar-btn-primary:hover { background: #3b55e6; border-color: #3b55e6; color: #fff; }

    .content-inner {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .content-iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Empty states */
    .state-empty, .state-no-select {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 40px;
    }
    .state-icon { font-size: 52px; }
    .state-title { font-size: 20px; font-weight: 700; color: #475569; }
    .state-desc { font-size: 13px; color: #94a3b8; line-height: 1.7; max-width: 380px; }
    .state-btn {
      padding: 10px 24px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .state-btn:hover { background: #3b55e6; }

    /* ══════════════════════════════
       MODAL
    ══════════════════════════════ */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      width: 460px;
      max-width: 95vw;
      box-shadow: 0 24px 60px rgba(0,0,0,0.22);
      animation: popIn 0.15s ease;
    }
    .modal.modal-wide {
      width: 780px;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; color: #0f172a; }
    .modal-sub { font-size: 12px; color: #94a3b8; margin-bottom: 22px; }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 6px;
      margin-top: 14px;
    }
    .field-label:first-child { margin-top: 0; }

    .modal-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      transition: border 0.15s;
      color: #1e293b;
    }
    .modal-code {
      width: 100%;
      min-height: 320px;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Consolas', 'Monaco', 'Menlo', monospace;
      outline: none;
      transition: border 0.15s;
      color: #1e293b;
      resize: vertical;
      line-height: 1.6;
      tab-size: 2;
    }
    .modal-code:focus { border-color: #4f6ef7; }
    .modal-code-hint {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 6px;
    }
    .modal-input:focus { border-color: #4f6ef7; }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 22px; }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-primary { background: #4f6ef7; color: #fff; }
    .btn-primary:hover { background: #3b55e6; }
    .btn-cancel { background: #f1f5f9; color: #475569; }
    .btn-cancel:hover { background: #e2e8f0; }
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="top-bar">
  <div class="corner">전략 ＼ 상품</div>
  <div class="tabs-scroll" id="productTabs"></div>
  <button class="tab-add" onclick="promptAddProduct()" title="상품 추가">＋</button>
</div>

<!-- ── Body ── -->
<div class="body-wrap">
  <div class="sidebar" id="sidebar"></div>
  <div class="content-area" id="contentArea"></div>
</div>

<!-- ── Modal ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">추가</div>
    <div class="modal-sub" id="modalSub"></div>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="modalOk" onclick="confirmModal()">확인</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
let state = {
  products:   [],   // { id, name }
  strategies: [],   // { id, name, collapsed }
  subs:       {},   // { strategyId: [{ id, name }] }
  cells:      {}    // { "pId_sId" | "pId_sub_subId": "https://..." }
};
let nextId = 1;
const uid = () => nextId++;

// Active selection (not persisted)
let activeProductId   = null;
let activeStrategyKey = null; // "s_id" or "sub_id"

// ── Persistence ────────────────────────────────────────────────
function save() {
  localStorage.setItem('mktDash2', JSON.stringify({ state, nextId }));
}
function load() {
  try {
    const raw = localStorage.getItem('mktDash2');
    if (!raw) return false;
    const d = JSON.parse(raw);
    state   = d.state;
    nextId  = d.nextId || 1;
    return true;
  } catch { return false; }
}

// ── Helpers ────────────────────────────────────────────────────
function cellKey(productId, stratKey) {
  // stratKey: "s_123" or "sub_456"
  const [type, id] = stratKey.split('_');
  return type === 'sub'
    ? `${productId}_sub_${id}`
    : `${productId}_${id}`;
}

function stratLabel(stratKey) {
  if (!stratKey) return '';
  const [type, id] = stratKey.split('_');
  const sid = Number(id);
  if (type === 'sub') {
    for (const s of state.strategies) {
      const sub = (state.subs[s.id] || []).find(x => x.id === sid);
      if (sub) return `${s.name} > ${sub.name}`;
    }
  } else {
    const s = state.strategies.find(x => x.id === sid);
    return s ? s.name : '';
  }
  return '';
}

function productName(pid) {
  const p = state.products.find(x => x.id === pid);
  return p ? p.name : '';
}

// ── Render ─────────────────────────────────────────────────────
function render() {
  renderTabs();
  renderSidebar();
  renderContent();
}

// Product tabs
function renderTabs() {
  const wrap = document.getElementById('productTabs');
  wrap.innerHTML = '';
  state.products.forEach(p => {
    const tab = document.createElement('div');
    tab.className = 'product-tab' + (p.id === activeProductId ? ' active' : '');
    tab.onclick = e => { if (e.target.classList.contains('tab-del')) return; selectProduct(p.id); };
    tab.innerHTML = `
      <input class="tab-name-inp" value="${esc(p.name)}"
        onclick="event.stopPropagation()"
        onblur="renameProduct(${p.id}, this.value)"
        onkeydown="if(event.key==='Enter')this.blur()" />
      <button class="tab-del" onclick="deleteProduct(${p.id})" title="삭제">✕</button>`;
    wrap.appendChild(tab);
  });
}

// Sidebar
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';

  state.strategies.forEach(st => {
    const subs = state.subs[st.id] || [];
    const hasSubs = subs.length > 0;
    const block = document.createElement('div');
    block.className = 'strategy-block';

    const isStrActive = activeStrategyKey === `s_${st.id}`;
    block.innerHTML = `
      <div class="strategy-row${isStrActive ? ' active' : ''}"
           onclick="selectStrategy('s_${st.id}')">
        <span class="strategy-toggle ${hasSubs ? 'has-subs' : ''}"
              onclick="event.stopPropagation(); toggleSubs(${st.id})">
          ${hasSubs ? (st.collapsed ? '▶' : '▼') : ''}
        </span>
        <input class="strategy-name-inp" value="${esc(st.name)}"
          onclick="selectStrategy('s_${st.id}'); event.stopPropagation()"
          onblur="renameStrategy(${st.id}, this.value)"
          onkeydown="if(event.key==='Enter')this.blur()" />
        <button class="row-del" onclick="event.stopPropagation(); deleteStrategy(${st.id})" title="삭제">✕</button>
      </div>`;

    // Sub rows
    if (!st.collapsed) {
      subs.forEach(sub => {
        const isSubActive = activeStrategyKey === `sub_${sub.id}`;
        const subDiv = document.createElement('div');
        subDiv.className = 'sub-row' + (isSubActive ? ' active' : '');
        subDiv.onclick = () => selectStrategy(`sub_${sub.id}`);
        subDiv.innerHTML = `
          <span class="sub-bullet"></span>
          <input class="sub-name-inp" value="${esc(sub.name)}"
            onclick="selectStrategy('sub_${sub.id}'); event.stopPropagation()"
            onblur="renameSub(${st.id}, ${sub.id}, this.value)"
            onkeydown="if(event.key==='Enter')this.blur()" />
          <button class="row-del" onclick="event.stopPropagation(); deleteSub(${st.id}, ${sub.id})" title="삭제">✕</button>`;
        block.appendChild(subDiv);
      });
    }

    // Add sub button
    const addSubBtn = document.createElement('button');
    addSubBtn.className = 'add-sub-btn';
    addSubBtn.textContent = '＋ 하위 카테고리 추가';
    addSubBtn.onclick = () => promptAddSub(st.id);
    block.appendChild(addSubBtn);

    sb.appendChild(block);
  });

  // Footer: add strategy
  const footer = document.createElement('div');
  footer.className = 'sidebar-footer';
  footer.innerHTML = `<button class="add-strategy-btn" onclick="promptAddStrategy()">＋ 전략 추가</button>`;
  sb.appendChild(footer);
}

// Content area
function renderContent() {
  const area = document.getElementById('contentArea');
  area.innerHTML = '';

  // No product selected
  if (!activeProductId) {
    area.innerHTML = `
      <div class="state-no-select">
        <div class="state-icon">📌</div>
        <div class="state-title">상품을 선택하세요</div>
        <div class="state-desc">상단의 상품 탭을 클릭하면<br>해당 상품의 전략 콘텐츠를 볼 수 있습니다.</div>
      </div>`;
    return;
  }

  // No strategy selected
  if (!activeStrategyKey) {
    area.innerHTML = `
      <div class="state-no-select">
        <div class="state-icon">📋</div>
        <div class="state-title">전략 카테고리를 선택하세요</div>
        <div class="state-desc">왼쪽 사이드바에서 전략을 클릭하면<br><strong>${productName(activeProductId)}</strong>에 해당하는 콘텐츠를 볼 수 있습니다.</div>
      </div>`;
    return;
  }

  const key   = cellKey(activeProductId, activeStrategyKey);
  const data  = getCellData(key);   // { type:'url'|'html', value } or null
  const label = stratLabel(activeStrategyKey);
  const pname = productName(activeProductId);

  // Toolbar
  const toolbar = document.createElement('div');
  toolbar.className = 'content-toolbar';
  const newTabBtn = data
    ? (data.type === 'url'
        ? `<button class="toolbar-btn" onclick="window.open('${esc(data.value)}','_blank')">↗ 새 탭</button>`
        : `<button class="toolbar-btn" onclick="openHtmlNewTab()">↗ 새 탭</button>`)
    : '';
  toolbar.innerHTML = `
    <div class="breadcrumb">
      <span class="bc-product">${esc(pname)}</span>
      <span class="bc-sep">›</span>
      <span class="bc-strategy">${esc(label)}</span>
      ${data ? `<span class="bc-sep">·</span><span style="font-size:11px;color:#94a3b8">${data.type === 'url' ? '🔗 URL' : '📄 HTML'}</span>` : ''}
    </div>
    ${newTabBtn}
    ${data ? `<button class="toolbar-btn" onclick="clearCell()" title="콘텐츠 삭제">🗑</button>` : ''}
    <button class="toolbar-btn" onclick="promptEditUrl()">🔗 URL 설정</button>
    <button class="toolbar-btn toolbar-btn-primary" onclick="promptEditHtml()">📄 HTML</button>`;
  area.appendChild(toolbar);

  const inner = document.createElement('div');
  inner.className = 'content-inner';

  if (data) {
    const iframe = document.createElement('iframe');
    iframe.className = 'content-iframe';
    iframe.setAttribute('allowfullscreen', '');
    if (data.type === 'url') {
      iframe.src = data.value;
      iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox');
    } else {
      iframe.srcdoc = data.value;
    }
    inner.appendChild(iframe);
  } else {
    inner.innerHTML = `
      <div class="state-empty">
        <div class="state-icon">📂</div>
        <div class="state-title">콘텐츠가 없습니다</div>
        <div class="state-desc">
          <strong>${esc(pname)} — ${esc(label)}</strong><br>
          URL을 등록하거나 HTML을 직접 붙여넣어 페이지를 만드세요.
        </div>
        <div style="display:flex;gap:10px;margin-top:4px">
          <button class="state-btn" style="background:#475569" onclick="promptEditUrl()">🔗 URL 등록</button>
          <button class="state-btn" onclick="promptEditHtml()">📄 HTML 작성</button>
        </div>
      </div>`;
  }

  area.appendChild(inner);
}

// ── Selection ──────────────────────────────────────────────────
function selectProduct(id) {
  activeProductId = id;
  render();
}

function selectStrategy(key) {
  activeStrategyKey = key;
  // Ensure parent is expanded
  if (key.startsWith('sub_')) {
    const subId = Number(key.split('_')[1]);
    for (const s of state.strategies) {
      if ((state.subs[s.id] || []).find(x => x.id === subId)) {
        s.collapsed = false;
        break;
      }
    }
  }
  render();
}

function toggleSubs(stratId) {
  const s = state.strategies.find(x => x.id === stratId);
  if (s) { s.collapsed = !s.collapsed; save(); renderSidebar(); }
}

// ── CRUD: Products ─────────────────────────────────────────────
function promptAddProduct() {
  openModal('상품 추가', '새 상품명을 입력하세요', [
    { id: 'pname', label: '상품명', placeholder: '예) CCTV, 복합기 렌탈 …' }
  ], vals => {
    const name = vals.pname.trim();
    if (!name) return;
    const id = uid();
    state.products.push({ id, name });
    save();
    activeProductId = id;
    render();
  });
}

function renameProduct(id, name) {
  const p = state.products.find(x => x.id === id);
  if (p && name.trim()) { p.name = name.trim(); save(); renderTabs(); }
}

function deleteProduct(id) {
  if (!confirm('이 상품을 삭제하시겠습니까?')) return;
  state.products = state.products.filter(p => p.id !== id);
  Object.keys(state.cells).forEach(k => { if (k.startsWith(`${id}_`)) delete state.cells[k]; });
  if (activeProductId === id) activeProductId = state.products[0]?.id || null;
  save(); render();
}

// ── CRUD: Strategies ───────────────────────────────────────────
function promptAddStrategy() {
  openModal('전략 추가', '새 전략명을 입력하세요', [
    { id: 'sname', label: '전략명', placeholder: '예) 시장분석, 마케팅전략 …' }
  ], vals => {
    const name = vals.sname.trim();
    if (!name) return;
    state.strategies.push({ id: uid(), name, collapsed: false });
    save(); render();
  });
}

function renameStrategy(id, name) {
  const s = state.strategies.find(x => x.id === id);
  if (s && name.trim()) { s.name = name.trim(); save(); }
}

function deleteStrategy(id) {
  if (!confirm('이 전략을 삭제하시겠습니까?')) return;
  const subs = state.subs[id] || [];
  // clean cells
  state.products.forEach(p => {
    delete state.cells[`${p.id}_${id}`];
    subs.forEach(sub => delete state.cells[`${p.id}_sub_${sub.id}`]);
  });
  delete state.subs[id];
  state.strategies = state.strategies.filter(s => s.id !== id);
  if (activeStrategyKey === `s_${id}`) activeStrategyKey = null;
  save(); render();
}

// ── CRUD: Subcategories ────────────────────────────────────────
function promptAddSub(stratId) {
  openModal('하위 카테고리 추가', '', [
    { id: 'subname', label: '하위 카테고리명', placeholder: '예) 기술, 가격, 국내시장 …' }
  ], vals => {
    const name = vals.subname.trim();
    if (!name) return;
    if (!state.subs[stratId]) state.subs[stratId] = [];
    const subId = uid();
    state.subs[stratId].push({ id: subId, name });
    const s = state.strategies.find(x => x.id === stratId);
    if (s) s.collapsed = false;
    save(); render();
  });
}

function renameSub(stratId, subId, name) {
  const sub = (state.subs[stratId] || []).find(x => x.id === subId);
  if (sub && name.trim()) { sub.name = name.trim(); save(); }
}

function deleteSub(stratId, subId) {
  if (!confirm('이 하위 카테고리를 삭제하시겠습니까?')) return;
  state.subs[stratId] = (state.subs[stratId] || []).filter(x => x.id !== subId);
  state.products.forEach(p => delete state.cells[`${p.id}_sub_${subId}`]);
  if (activeStrategyKey === `sub_${subId}`) activeStrategyKey = null;
  save(); render();
}

// ── Cell data helpers ──────────────────────────────────────────
function getCellData(key) {
  const v = state.cells[key];
  if (!v) return null;
  if (typeof v === 'string') return { type: 'url', value: v }; // backwards compat
  return v;
}

function clearCell() {
  if (!activeProductId || !activeStrategyKey) return;
  if (!confirm('이 콘텐츠를 삭제하시겠습니까?')) return;
  delete state.cells[cellKey(activeProductId, activeStrategyKey)];
  save(); renderContent();
}

function openHtmlNewTab() {
  const data = getCellData(cellKey(activeProductId, activeStrategyKey));
  if (!data || data.type !== 'html') return;
  const blob = new Blob([data.value], { type: 'text/html' });
  window.open(URL.createObjectURL(blob), '_blank');
}

// ── URL editing ────────────────────────────────────────────────
function promptEditUrl() {
  if (!activeProductId || !activeStrategyKey) return;
  const key   = cellKey(activeProductId, activeStrategyKey);
  const data  = getCellData(key);
  const cur   = (data?.type === 'url') ? data.value : '';
  const pname = productName(activeProductId);
  const label = stratLabel(activeStrategyKey);

  openModal(
    '🔗 URL 등록',
    `${pname} — ${label}`,
    [{ id: 'url', label: '페이지 URL', placeholder: 'https://example.com', value: cur }],
    vals => {
      const url = vals.url.trim();
      if (url) state.cells[key] = { type: 'url', value: url };
      else delete state.cells[key];
      save(); renderContent();
    },
    '저장'
  );
}

// ── HTML editing ───────────────────────────────────────────────
function promptEditHtml() {
  if (!activeProductId || !activeStrategyKey) return;
  const key   = cellKey(activeProductId, activeStrategyKey);
  const data  = getCellData(key);
  const cur   = (data?.type === 'html') ? data.value : '';
  const pname = productName(activeProductId);
  const label = stratLabel(activeStrategyKey);

  openModal(
    '📄 HTML 편집',
    `${pname} — ${label}`,
    [{ id: 'html', label: 'HTML 코드를 붙여넣으세요', placeholder: '<!DOCTYPE html>\n<html>...</html>', value: cur, type: 'textarea' }],
    vals => {
      const html = vals.html.trim();
      if (html) state.cells[key] = { type: 'html', value: html };
      else delete state.cells[key];
      save(); renderContent();
    },
    '저장',
    { wide: true }
  );
}

// ── Modal engine ───────────────────────────────────────────────
let _modalCb = null;

function openModal(title, sub, fields, cb, okLabel = '확인', opts = {}) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalSub').textContent   = sub;
  document.getElementById('modalOk').textContent    = okLabel;
  _modalCb = cb;

  // Wide mode
  const modal = document.querySelector('.modal');
  modal.classList.toggle('modal-wide', !!opts.wide);

  const body = document.getElementById('modalBody');
  body.innerHTML = fields.map(f => {
    if (f.type === 'textarea') {
      return `
        <label class="field-label" for="mf_${f.id}">${f.label}</label>
        <textarea class="modal-input modal-code" id="mf_${f.id}"
          placeholder="${esc(f.placeholder || '')}"
          spellcheck="false">${esc(f.value || '')}</textarea>
        <div class="modal-code-hint">전체 HTML 코드를 붙여넣으세요. &lt;!DOCTYPE html&gt; 포함 권장.</div>`;
    }
    return `
      <label class="field-label" for="mf_${f.id}">${f.label}</label>
      <input class="modal-input" id="mf_${f.id}"
        placeholder="${esc(f.placeholder || '')}"
        value="${esc(f.value || '')}" />`;
  }).join('');

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById(`mf_${fields[0].id}`)?.focus(), 60);

  // Enter to confirm only for single-line inputs (not textarea)
  body.querySelectorAll('input.modal-input').forEach(inp => {
    inp.onkeydown = e => { if (e.key === 'Enter') confirmModal(); if (e.key === 'Escape') closeModal(); };
  });
  body.querySelectorAll('textarea.modal-input').forEach(ta => {
    ta.onkeydown = e => { if (e.key === 'Escape') closeModal(); };
  });
}

function confirmModal() {
  const body   = document.getElementById('modalBody');
  const inputs = body.querySelectorAll('.modal-input');
  const vals   = {};
  inputs.forEach(inp => { vals[inp.id.replace('mf_', '')] = inp.value; });
  if (_modalCb) _modalCb(vals);
  closeModal();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  _modalCb = null;
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ── Utility ────────────────────────────────────────────────────
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Init ───────────────────────────────────────────────────────
function init() {
  if (!load()) {
    // Default data
    const p1 = uid(), p2 = uid(), p3 = uid();
    state.products = [
      { id: p1, name: 'CCTV' },
      { id: p2, name: '복합기 렌탈' },
      { id: p3, name: '커피 도매' }
    ];
    const s1 = uid(), s2 = uid(), s3 = uid(), s4 = uid(), s5 = uid();
    state.strategies = [
      { id: s1, name: '시장분석',  collapsed: false },
      { id: s2, name: '시장단가비교', collapsed: false },
      { id: s3, name: '마케팅1',   collapsed: false },
      { id: s4, name: '마케팅2',   collapsed: false },
      { id: s5, name: '결과분석',  collapsed: false }
    ];
    const sub1 = uid();
    state.subs = { [s2]: [{ id: sub1, name: '기술' }] };
    state.cells = {};
    save();
  }
  // Auto-select first product and first strategy
  if (!activeProductId && state.products.length) activeProductId = state.products[0].id;
  if (!activeStrategyKey && state.strategies.length) activeStrategyKey = `s_${state.strategies[0].id}`;
  render();
}

init();
</script>
